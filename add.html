<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Add Student</h2>

<form method="POST">
    <input type="text" name="name" placeholder="Name" required><br>
    <input type="text" name="student_id" placeholder="Student ID" required><br>
    <input type="number" name="s1" placeholder="Subject 1" required><br>
    <input type="number" name="s2" placeholder="Subject 2" required><br>
    <input type="number" name="s3" placeholder="Subject 3" required><br>

    <button type="submit">Save</button>
</form>

</body>
</html>
